name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autopay_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    env:
      # ── App config — these are test values, never used in prod ──
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/autopay_test
      JWT_SECRET_KEY: ci-test-jwt-secret-must-be-at-least-32-chars-long
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 7
      BVN_ENCRYPTION_KEY: "DpxUMqi5MrL9VWv1P-9cKs7lONQOTrMOy7rET_d5Yoo="
      PAYSTACK_SECRET_KEY: sk_test_ci_dummy
      PAYSTACK_PUBLIC_KEY: pk_test_ci_dummy
      GROQ_API_KEY: ""
      GOOGLE_API_KEY: ""
      LANGCHAIN_API_KEY: ""
      LANGCHAIN_TRACING_V2: "false"
      PAYOUT_FEE_NGN: "50.00"
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: autopay_test
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Apply schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d autopay_test -f schema.sql

      - name: Lint (ruff)
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest -q --tb=short

      - name: Coverage report
        if: success()
        run: |
          pytest --cov=app --cov-report=term --cov-report=xml -q
        continue-on-error: true  # coverage gate is advisory; don't block PRs yet

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
